<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="Style_sheets/login_signup.css">
</head>
<body>
    <!-- Sign up -->
    <div id="sign_up"  class="sign_up">
        <div class="top-div">
            <h2>SIGN UP</h2>
        </div>
        <div id="input-fields">

            <label for="First Name">Names</label>
            <input type="text" name="First Name" id="f-name" required>
        
            <label for="email"> Email</label>
            <input type="email" name="email" id="email" required>
        
            <label for="password"> Create Password</label>
            <input type="password" name="password" id="password" required >
    
            <label for="c-password">Confirm Password</label>
            <input type="password" name="c-password" id="c-password" required>
            <ul>
                <li id="password_length">Password should be atleast 8 characters long</li>
                <li id="password_contain_digit">Password should contain atleast one digit</li>
                <li id="password_contains_s_char">Password should contain atleast one special character</li>  
            </ul>

            <button id="sign-up"  onclick="validate_user_information()"> SIGN UP</button>
            <label>
                <a href="#" >Forgot password</a>
            </label>
            <label>
                <p>Already have an account? <button id="login-signup_toggle" onclick="log_sign_toogle()" > Login</button> </p> 
            </label>
        </div>
        <div class="otp_prompt1" id="otp_prompt">
            <label for="OTP" id="otp_label"> Enter a six-digit OTP</label>
            <input type="text" name="OTP" id="OTP" placeholder="OTP">
            <button id="submit_otp" onclick="sign_up()">Verify</button>

        </div>
        
    </div>
    <!--log in-->

    <div id="log_in" class="log_in1">
          <div class="top-div">
            <h2>LOG IN</h2>
          </div>
          <div id="input-fields">
            <label>
                <label for="email1"> Username</label>
                <input type="email" name="email1" id="email1">
            </label>
            <label >
                <label for="e-password">Password</label>
                <input type="password" name="e-password" id="e-password" >
            </label>
            <button id="losg-in" onclick="login()">LOGIN</button>
            <label>
                <a href="#" >Forgot password</a>
            </label>
            <label>
                <p>Don't have an account? <button id="login-signup_toggle" onclick="log_sign_toogle()">Create an account</button> </p> 
            </label>
    
</body>
<script src="/Scripts/login_signup.js"></script>
</html>
